spring:
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema-local.sql
      continue-on-error: true
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:wuxing_local;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    username: sa
    password:
  h2:
    console:
      enabled: true
  data:
    redis:
      host: localhost
      port: 6379

management:
  health:
    redis:
      enabled: false

app:
  base-url: ${APP_BASE_URL:http://localhost:5173}
  admin-token: ${ADMIN_TOKEN:dev-token}
  hash-salt: ${HASH_SALT:dev-salt}
  short-link:
    mode: ${SHORT_LINK_MODE:internal}
    external:
      base-url: ${SHORT_LINK_EXTERNAL_BASE_URL:http://localhost:8003}
      group-id: ${SHORT_LINK_EXTERNAL_GROUP_ID:wuxing_persona}
      domain: ${SHORT_LINK_EXTERNAL_DOMAIN:nurl.ink:8003}
      fallback-to-internal: ${SHORT_LINK_EXTERNAL_FALLBACK_TO_INTERNAL:true}
      connect-timeout-millis: ${SHORT_LINK_EXTERNAL_CONNECT_TIMEOUT_MILLIS:2000}
      read-timeout-millis: ${SHORT_LINK_EXTERNAL_READ_TIMEOUT_MILLIS:3000}
