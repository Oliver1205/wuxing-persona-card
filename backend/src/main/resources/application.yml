spring:
  application:
    name: wuxing-persona-backend
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
      continue-on-error: true
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/wuxing_persona?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${SPRING_DATASOURCE_USERNAME:wuxing}
    password: ${SPRING_DATASOURCE_PASSWORD:change-me}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: ${SERVER_PORT:8080}

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  base-url: ${APP_BASE_URL:http://localhost:8080}
  admin-token: ${ADMIN_TOKEN:change-me}
  hash-salt: ${HASH_SALT:change-me}
  short-link:
    mode: ${SHORT_LINK_MODE:internal}
    external:
      base-url: ${SHORT_LINK_EXTERNAL_BASE_URL:http://localhost:8003}
      group-id: ${SHORT_LINK_EXTERNAL_GROUP_ID:wuxing_persona}
      domain: ${SHORT_LINK_EXTERNAL_DOMAIN:nurl.ink:8003}
      fallback-to-internal: ${SHORT_LINK_EXTERNAL_FALLBACK_TO_INTERNAL:true}
      system-username: ${SHORT_LINK_EXTERNAL_SYSTEM_USERNAME:wuxing_system}
      system-user-id: ${SHORT_LINK_EXTERNAL_SYSTEM_USER_ID:wuxing-system}
      system-real-name: ${SHORT_LINK_EXTERNAL_SYSTEM_REAL_NAME:wuxing-system}
      connect-timeout-millis: ${SHORT_LINK_EXTERNAL_CONNECT_TIMEOUT_MILLIS:2000}
      read-timeout-millis: ${SHORT_LINK_EXTERNAL_READ_TIMEOUT_MILLIS:3000}
