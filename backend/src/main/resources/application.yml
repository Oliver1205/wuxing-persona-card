spring:
  application:
    name: wuxing-persona-backend
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
      continue-on-error: true
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/wuxing_persona?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${SPRING_DATASOURCE_USERNAME:wuxing}
    password: ${SPRING_DATASOURCE_PASSWORD:change-me}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: ${SERVER_PORT:8080}

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  base-url: ${APP_BASE_URL:http://localhost:8080}
  admin-token: ${ADMIN_TOKEN:change-me}
  hash-salt: ${HASH_SALT:change-me}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}
    max-age-seconds: ${CORS_MAX_AGE_SECONDS:3600}
  short-link:
    mode: ${SHORT_LINK_MODE:internal}
    last-visit-touch-interval-seconds: ${SHORT_LINK_LAST_VISIT_TOUCH_INTERVAL_SECONDS:30}
    external:
      base-url: ${SHORT_LINK_EXTERNAL_BASE_URL:http://localhost:8003}
      group-id: ${SHORT_LINK_EXTERNAL_GROUP_ID:wuxing_persona}
      domain: ${SHORT_LINK_EXTERNAL_DOMAIN:nurl.ink:8003}
      fallback-to-internal: ${SHORT_LINK_EXTERNAL_FALLBACK_TO_INTERNAL:true}
      system-username: ${SHORT_LINK_EXTERNAL_SYSTEM_USERNAME:wuxing_system}
      system-user-id: ${SHORT_LINK_EXTERNAL_SYSTEM_USER_ID:wuxing-system}
      system-real-name: ${SHORT_LINK_EXTERNAL_SYSTEM_REAL_NAME:wuxing-system}
      connect-timeout-millis: ${SHORT_LINK_EXTERNAL_CONNECT_TIMEOUT_MILLIS:2000}
      read-timeout-millis: ${SHORT_LINK_EXTERNAL_READ_TIMEOUT_MILLIS:3000}
      stats-enabled: ${SHORT_LINK_EXTERNAL_STATS_ENABLED:false}
      stats-enable-status: ${SHORT_LINK_EXTERNAL_STATS_ENABLE_STATUS:0}
      stats-cache-ttl-seconds: ${SHORT_LINK_EXTERNAL_STATS_CACHE_TTL_SECONDS:60}
  visit-event:
    async-queue-capacity: ${VISIT_EVENT_ASYNC_QUEUE_CAPACITY:2048}
    async-drain-limit: ${VISIT_EVENT_ASYNC_DRAIN_LIMIT:64}
    async-mode: ${VISIT_EVENT_ASYNC_MODE:local}
    rocketmq:
      name-server: ${VISIT_EVENT_ROCKETMQ_NAME_SERVER:localhost:9876}
      topic: ${VISIT_EVENT_ROCKETMQ_TOPIC:wuxing-visit-event}
      tag: ${VISIT_EVENT_ROCKETMQ_TAG:visit}
      producer-group: ${VISIT_EVENT_ROCKETMQ_PRODUCER_GROUP:wuxing-persona-producer}
      consumer-group: ${VISIT_EVENT_ROCKETMQ_CONSUMER_GROUP:wuxing-persona-consumer}
      publish-timeout-millis: ${VISIT_EVENT_ROCKETMQ_PUBLISH_TIMEOUT_MILLIS:1000}
      fallback-to-local: ${VISIT_EVENT_ROCKETMQ_FALLBACK_TO_LOCAL:true}
      consumer-enabled: ${VISIT_EVENT_ROCKETMQ_CONSUMER_ENABLED:false}
  analytics:
    enabled: ${ANALYTICS_ENABLED:true}
    heartbeat-interval-millis: ${ANALYTICS_HEARTBEAT_INTERVAL:30000}
    online-window-millis: ${ANALYTICS_ONLINE_WINDOW:120000}
