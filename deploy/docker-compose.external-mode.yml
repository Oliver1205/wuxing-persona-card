services:
  backend:
    environment:
      SHORT_LINK_MODE: external
      SHORT_LINK_EXTERNAL_BASE_URL: ${SHORT_LINK_EXTERNAL_BASE_URL:-http://host.docker.internal:8003}
      SHORT_LINK_EXTERNAL_GROUP_ID: ${SHORT_LINK_EXTERNAL_GROUP_ID:-wuxing_persona}
      SHORT_LINK_EXTERNAL_DOMAIN: ${SHORT_LINK_EXTERNAL_DOMAIN:-s.example.com}
      SHORT_LINK_EXTERNAL_FALLBACK_TO_INTERNAL: ${SHORT_LINK_EXTERNAL_FALLBACK_TO_INTERNAL:-true}
      SHORT_LINK_EXTERNAL_SYSTEM_USERNAME: ${SHORT_LINK_EXTERNAL_SYSTEM_USERNAME:-wuxing_system}
      SHORT_LINK_EXTERNAL_SYSTEM_USER_ID: ${SHORT_LINK_EXTERNAL_SYSTEM_USER_ID:-wuxing-system}
      SHORT_LINK_EXTERNAL_SYSTEM_REAL_NAME: ${SHORT_LINK_EXTERNAL_SYSTEM_REAL_NAME:-wuxing-system}
      SHORT_LINK_EXTERNAL_CONNECT_TIMEOUT_MILLIS: ${SHORT_LINK_EXTERNAL_CONNECT_TIMEOUT_MILLIS:-2000}
      SHORT_LINK_EXTERNAL_READ_TIMEOUT_MILLIS: ${SHORT_LINK_EXTERNAL_READ_TIMEOUT_MILLIS:-3000}
      SHORT_LINK_EXTERNAL_STATS_ENABLED: ${SHORT_LINK_EXTERNAL_STATS_ENABLED:-true}
      SHORT_LINK_EXTERNAL_STATS_ENABLE_STATUS: ${SHORT_LINK_EXTERNAL_STATS_ENABLE_STATUS:-0}
    extra_hosts:
      - "host.docker.internal:host-gateway"
