services:
  mysql:
    image: mysql:8.4
    container_name: wuxing-mysql
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-wuxing_persona}
      MYSQL_USER: ${MYSQL_USER:-wuxing}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change-me}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change-me}
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
      - ../backend/src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/01-wuxing-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - wuxing_net

  redis:
    image: redis:7.4-alpine
    container_name: wuxing-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - wuxing_net

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      args:
        MAVEN_IMAGE: ${BACKEND_MAVEN_IMAGE:-maven:3.9.9-eclipse-temurin-17}
        RUNTIME_IMAGE: ${BACKEND_RUNTIME_IMAGE:-eclipse-temurin:17-jre}
    container_name: wuxing-backend
    environment:
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-change-me}
      HASH_SALT: ${HASH_SALT:-change-me}
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-wuxing_persona}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-wuxing}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-change-me}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wuxing_net

  nginx:
    build:
      context: ..
      dockerfile: deploy/nginx.Dockerfile
      args:
        NODE_IMAGE: ${FRONTEND_NODE_IMAGE:-node:20-alpine}
        NGINX_IMAGE: ${FRONTEND_NGINX_IMAGE:-nginx:1.27-alpine}
    container_name: wuxing-nginx
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - wuxing_net

volumes:
  mysql_data:
  redis_data:

networks:
  wuxing_net:
    driver: bridge
