# Optional production routing examples for the external shortlink service.
# This file is not loaded by the default Docker Compose stack.
#
# Recommended topology:
#   your-domain.com   -> Wuxing H5 and API
#   s.your-domain.com -> external shortlink service

upstream wuxing_backend {
    server backend:8080;
}

upstream external_shortlink {
    server shortlink:8003;
}

server {
    listen 80;
    server_name your-domain.com;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://wuxing_backend/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Keep this block when SHORT_LINK_MODE=internal or when /s/** is used as
    # a compatibility fallback to the Wuxing backend.
    location /s/ {
        proxy_pass http://wuxing_backend/s/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin {
        try_files $uri $uri/ /index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    server_name s.your-domain.com;

    location / {
        proxy_pass http://external_shortlink;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

