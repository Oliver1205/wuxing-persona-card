# Host-level Nginx template for a real domain launch.
#
# Intended topology:
#   Internet -> host Nginx :80/:443 -> Docker Compose nginx on 127.0.0.1:8088
#
# Recommended Compose env:
#   NGINX_HTTP_PORT=127.0.0.1:8088
#   APP_BASE_URL=https://wuxing.example.com
#   SHORT_LINK_MODE=internal
#
# Replace:
#   wuxing.example.com
#   /etc/letsencrypt/live/wuxing.example.com/fullchain.pem
#   /etc/letsencrypt/live/wuxing.example.com/privkey.pem
#
# First-time certificate issue:
#   Use docs/domain-server-runbook.md to create a temporary HTTP-only vhost,
#   issue the certificate, then enable this TLS template.

upstream wuxing_container_nginx {
    server 127.0.0.1:8088;
    keepalive 16;
}

server {
    listen 80;
    server_name wuxing.example.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name wuxing.example.com;

    ssl_certificate /etc/letsencrypt/live/wuxing.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wuxing.example.com/privkey.pem;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 1m;

    # Add includeSubDomains only after every subdomain is confirmed HTTPS-ready.
    add_header Strict-Transport-Security "max-age=15552000" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location / {
        proxy_pass http://wuxing_container_nginx;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 3s;
        proxy_read_timeout 30s;
    }
}
