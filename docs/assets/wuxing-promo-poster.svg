<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">五行人格卡项目主视觉</title>
  <desc id="desc">展示五行人格卡的结果卡、专属短链、朋友回流和后台统计闭环。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f9f4e8"/>
      <stop offset="48%" stop-color="#edf5f0"/>
      <stop offset="100%" stop-color="#f7eee8"/>
    </linearGradient>
    <linearGradient id="phone" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#fffdf8"/>
      <stop offset="100%" stop-color="#edf7f2"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#24302f"/>
      <stop offset="100%" stop-color="#2f6f5e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#1f302b" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="138" cy="110" r="78" fill="#d79b43" opacity="0.16"/>
  <circle cx="1448" cy="752" r="116" fill="#2f6f5e" opacity="0.12"/>
  <circle cx="1268" cy="178" r="62" fill="#b85b48" opacity="0.12"/>

  <g transform="translate(118 96)">
    <text x="0" y="0" fill="#9b6d32" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="28" font-weight="800">商业级 H5 微项目</text>
    <text x="0" y="76" fill="#21332f" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="76" font-weight="900">五行人格卡</text>
    <text x="0" y="130" fill="#40514e" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="30" font-weight="700">90 秒生成可分享人格卡</text>
  </g>

  <g transform="translate(132 246)" filter="url(#shadow)">
    <rect x="0" y="0" width="410" height="586" rx="42" fill="#1f2d2b"/>
    <rect x="22" y="24" width="366" height="538" rx="32" fill="url(#phone)"/>
    <rect x="56" y="64" width="298" height="174" rx="22" fill="url(#card)"/>
    <text x="84" y="111" fill="#e7c783" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="800">你的五行人格身份</text>
    <text x="84" y="158" fill="#ffffff" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="34" font-weight="900">金木 · 星官</text>
    <text x="84" y="199" fill="#d9eee6" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="700">清醒 · 生长 · 判断</text>

    <g transform="translate(56 270)">
      <rect width="298" height="88" rx="18" fill="#ffffff" stroke="#dce4df"/>
      <text x="24" y="36" fill="#21332f" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="900">主五行 62%</text>
      <rect x="24" y="54" width="242" height="12" rx="6" fill="#edf1ec"/>
      <rect x="24" y="54" width="150" height="12" rx="6" fill="#2f6f5e"/>
    </g>

    <g transform="translate(56 382)">
      <rect width="298" height="58" rx="18" fill="#fff7e8" stroke="#e8d9bd"/>
      <text x="24" y="38" fill="#6d4f29" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="900">保存分享图</text>
      <text x="204" y="38" fill="#2f6f5e" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="900">复制短链</text>
    </g>

    <g transform="translate(56 468)">
      <rect width="298" height="50" rx="16" fill="#24302f"/>
      <text x="58" y="33" fill="#ffffff" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="19" font-weight="900">朋友打开，也能测一张</text>
    </g>
  </g>

  <g transform="translate(642 274)">
    <rect x="0" y="0" width="812" height="472" rx="36" fill="#fffdf8" stroke="#ded8cc" filter="url(#shadow)"/>
    <text x="52" y="70" fill="#21332f" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="36" font-weight="900">从体验到工程的完整闭环</text>
    <text x="52" y="112" fill="#68756f" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="700">匿名测算 -> 结果生成 -> 专属短链 -> 朋友访问 -> 后台统计</text>

    <g transform="translate(52 166)">
      <g>
        <rect width="132" height="78" rx="18" fill="#edf7f2" stroke="#c8ddd3"/>
        <text x="66" y="48" text-anchor="middle" fill="#1d5948" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="900">测算</text>
      </g>
      <g transform="translate(160 0)">
        <rect width="132" height="78" rx="18" fill="#fff7e8" stroke="#ead7b6"/>
        <text x="66" y="48" text-anchor="middle" fill="#8a5c1e" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="900">结果</text>
      </g>
      <g transform="translate(320 0)">
        <rect width="132" height="78" rx="18" fill="#eef4f9" stroke="#cddce8"/>
        <text x="66" y="48" text-anchor="middle" fill="#315f7b" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="900">短链</text>
      </g>
      <g transform="translate(480 0)">
        <rect width="132" height="78" rx="18" fill="#f9eeee" stroke="#e7cdca"/>
        <text x="66" y="48" text-anchor="middle" fill="#8d4038" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="900">回流</text>
      </g>
      <g transform="translate(640 0)">
        <rect width="132" height="78" rx="18" fill="#f4faf7" stroke="#c8ddd3"/>
        <text x="66" y="48" text-anchor="middle" fill="#1d5948" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="900">后台</text>
      </g>
      <path d="M132 39 H160 M292 39 H320 M452 39 H480 M612 39 H640" stroke="#9daaa4" stroke-width="4" stroke-linecap="round"/>
    </g>

    <g transform="translate(52 302)">
      <rect width="220" height="96" rx="20" fill="#24302f"/>
      <text x="28" y="40" fill="#e7c783" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="900">Redis 缓存</text>
      <text x="28" y="72" fill="#ffffff" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="900">短码低延迟解析</text>
    </g>
    <g transform="translate(296 302)">
      <rect width="220" height="96" rx="20" fill="#2f6f5e"/>
      <text x="28" y="40" fill="#d9eee6" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="900">事件明细</text>
      <text x="28" y="72" fill="#ffffff" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="900">PV / UV / UIP</text>
    </g>
    <g transform="translate(540 302)">
      <rect width="220" height="96" rx="20" fill="#c9893a"/>
      <text x="28" y="40" fill="#fff4dc" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="900">性能 smoke</text>
      <text x="28" y="72" fill="#ffffff" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="900">可复现验证</text>
    </g>
  </g>
</svg>
